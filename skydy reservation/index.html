<script>
        const menuIcon = document.querySelector('.menu-icon');
        const sidebar = document.querySelector('.sidebar');
        const navLinks = document.querySelector('.nav-links');
        const logoContainer = document.querySelector('.logo-container');

        menuIcon.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        document.getElementById('bg-slider').style.backgroundImage = 'url("images/wp.jpg")';

        const carousel = document.querySelector('.slider');
        const slides = document.querySelectorAll('.slider img');
        const dots = document.querySelectorAll('.slider-nav a');
        let currentSlideIndex = 0;
        let autoSlideTimer;
        let isInternalScroll = false; 

        function updateActiveDot(index) {
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        carousel.addEventListener('scroll', () => {
            if (isInternalScroll) return; 

            const width = carousel.offsetWidth;
            const newIndex = Math.round(carousel.scrollLeft / width);
            
            if (newIndex !== currentSlideIndex && newIndex >= 0 && newIndex < slides.length) {
                currentSlideIndex = newIndex;
                updateActiveDot(currentSlideIndex);
            }
        });

        function startAutoSlide() {
            autoSlideTimer = setInterval(() => {
                currentSlideIndex++;
                
                if (currentSlideIndex >= slides.length) {
                    currentSlideIndex = 0; 
                }
                
                isInternalScroll = true;
                carousel.scrollLeft = slides[currentSlideIndex].offsetLeft;
                updateActiveDot(currentSlideIndex);
                
                // Release control back to user after the transition finish animation
                setTimeout(() => { isInternalScroll = false; }, 600);
                
            }, 3500); 
        }

        // 7. Manual Click Handler For Dots (THE FIX FOR CLICKING DOTS)
        dots.forEach((dot, index) => {
            dot.addEventListener('click', (e) => {
                // Prevent the default browser hashtag anchor behavior which jumps pages
                e.preventDefault(); 
                
                clearInterval(autoSlideTimer); // Pause the auto slider when user clicks
                
                currentSlideIndex = index;
                isInternalScroll = true;
                
                carousel.scrollLeft = slides[currentSlideIndex].offsetLeft;
                updateActiveDot(currentSlideIndex);
                
                setTimeout(() => { 
                    isInternalScroll = false; 
                    startAutoSlide(); // Safely restart the cycle after they are done
                }, 600);
            });
        });

        // 8. Initialize Carousel on Page Load
        updateActiveDot(0);
        startAutoSlide();

        // 9. Event Listeners for Pausing on Swipe/Hover
        const carouselContainer = document.querySelector('.slider-wrapper');
        carouselContainer.addEventListener('mouseenter', () => clearInterval(autoSlideTimer));
        carouselContainer.addEventListener('mouseleave', startAutoSlide);
        carouselContainer.addEventListener('touchstart', () => clearInterval(autoSlideTimer));
        carouselContainer.addEventListener('touchend', startAutoSlide);
    </script>
